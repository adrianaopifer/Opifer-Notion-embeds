<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIFER | Test Embed</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #D94E1A;
    --coral: #FF9A6B;
    --dark: #1A1612;
    --mid: #2E2420;
    --light: #F7F2EE;
    --muted: #9E8E85;
    --border: rgba(217,78,26,0.2);
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--dark);
    color: var(--light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(217,78,26,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(255,154,107,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .card {
    position: relative;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem 3.5rem;
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--orange), transparent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--coral);
    background: rgba(217,78,26,0.12);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
    margin-bottom: 2rem;
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo-mark {
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 0.5rem;
    animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-mark span {
    background: linear-gradient(135deg, var(--orange), var(--coral));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), var(--coral));
    margin: 0 auto 2.5rem;
    border-radius: 2px;
    animation: fadeUp 0.7s 0.25s cubic-bezier(0.22,1,0.36,1) both;
  }

  .message {
    font-size: 1.05rem;
    font-weight: 400;
    line-height: 1.7;
    color: rgba(247,242,238,0.75);
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .message strong {
    color: var(--light);
    font-weight: 600;
  }

  .meta {
    display: flex;
    justify-content: center;
    gap: 2rem;
    animation: fadeUp 0.7s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-value {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--coral);
  }
</style>
</head>
<body>
<div class="card">
  <div class="badge">GitHub Pages → Notion Embed</div>
  <div class="logo-mark"><span>OPIFER</span></div>
  <div class="tagline">Empowering Clarity</div>
  <div class="divider"></div>
  <p class="message">
    🎉 <strong>Embed working!</strong><br>
    This page is hosted on GitHub Pages and rendered live inside your Notion workspace. Any tool, dashboard, or interactive asset Claude builds can live here.
  </p>
  <div class="meta">
    <div class="meta-item">
      <span class="meta-label">Hosted on</span>
      <span class="meta-value">GitHub Pages</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Embedded in</span>
      <span class="meta-value">Notion</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Plan</span>
      <span class="meta-value">Enterprise Ltd</span>
    </div>
  </div>
</div>
</body>
</html>
